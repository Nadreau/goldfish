<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0c;
      color: white;
    }
    
    .header {
      padding: 20px;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(167, 139, 250, 0.05));
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    
    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #8b5cf6, #a78bfa);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    
    .logo-text {
      font-size: 16px;
      font-weight: 600;
    }
    
    .tagline {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
    }
    
    .content {
      padding: 16px 20px;
    }
    
    .status-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      margin-bottom: 16px;
    }
    
    .status-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    
    .status-dot.connected {
      background: #34d399;
      box-shadow: 0 0 8px rgba(52, 211, 153, 0.5);
    }
    
    .status-dot.disconnected {
      background: #f59e0b;
    }
    
    .status-dot.disabled {
      background: #6b7280;
    }
    
    .status-label {
      font-size: 13px;
      font-weight: 500;
    }
    
    .toggle {
      width: 44px;
      height: 24px;
      background: #374151;
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
    }
    
    .toggle.active {
      background: #8b5cf6;
    }
    
    .toggle-knob {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    
    .toggle.active .toggle-knob {
      transform: translateX(20px);
    }
    
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .stat {
      padding: 12px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 10px;
    }
    
    .stat-value {
      font-size: 20px;
      font-weight: 600;
      color: #a78bfa;
    }
    
    .stat-label {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      margin-top: 2px;
    }
    
    .open-app {
      display: block;
      width: 100%;
      padding: 12px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 10px;
      color: #a78bfa;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .open-app:hover {
      background: rgba(139, 92, 246, 0.15);
      border-color: rgba(139, 92, 246, 0.3);
    }
    
    .footer {
      padding: 12px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      font-size: 10px;
      color: rgba(255, 255, 255, 0.3);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🌉</div>
      <span class="logo-text">ContextBridge</span>
    </div>
    <div class="tagline">Your AI remembers everything</div>
  </div>
  
  <div class="content">
    <div class="status-card">
      <div class="status-info">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-label" id="statusLabel">Connecting...</span>
      </div>
      <div class="toggle" id="toggle">
        <div class="toggle-knob"></div>
      </div>
    </div>
    
    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="memoryCount">-</div>
        <div class="stat-label">Memories</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="todayCount">-</div>
        <div class="stat-label">Today</div>
      </div>
    </div>
    
    <button class="open-app" id="openApp">Open ContextBridge App</button>
  </div>
  
  <div class="footer">
    Type naturally. Context flows automatically.
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
