name: Release macOS

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Ad-hoc codesign (reduces first-launch friction)
        run: |
          APP="src-tauri/target/release/bundle/macos/Goldfish.app"
          if [ -d "$APP" ]; then
            codesign --force --deep --sign - "$APP" || true
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
          body: |
            ## Install Goldfish

            **Easiest:** one Terminal command installs everything and handles the macOS unblock step for you.

            ```bash
            curl -fsSL https://nadreau.github.io/goldfish/install.sh | bash
            ```

            **Or download manually:**

            1. Download the `.dmg` below
            2. Open it and drag Goldfish to Applications
            3. One-time unblock (since the app isn't Apple-signed yet):
               ```bash
               xattr -cr /Applications/Goldfish.app
               ```
            4. Launch Goldfish — the onboarding connects your AI tools automatically

            ### Power users — connect extra AI tools from the CLI

            ```bash
            npx goldfish-mcp setup
            ```

            Auto-detects and configures Claude Desktop, Claude Code, Cursor, and Windsurf.

            Learn more → [nadreau.github.io/goldfish](https://nadreau.github.io/goldfish)
          draft: false
          prerelease: false
          make_latest: true
